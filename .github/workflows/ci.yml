name: CI / Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Tests ────────────────────────────────────────────────────────────────
  # Run on Linux — all test projects target net10.0 (no Mac-specific code).
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Run tests
        run: |
          for proj in \
            MauiMds/MauiMds.Tests/MauiMds.Tests.csproj \
            MauiMds/MauiMds.Core.Tests/MauiMds.Core.Tests.csproj \
            MauiMds/MauiMds.AudioCapture.Tests/MauiMds.AudioCapture.Tests.csproj \
            MauiMds/MauiMds.Pdf.Tests/MauiMds.Pdf.Tests.csproj; do
            dotnet test "$proj" -c Release --logger "console;verbosity=normal"
          done

  # ── Build & Package ──────────────────────────────────────────────────────
  # Requires macOS + Xcode to build Mac Catalyst. Uses ad-hoc signing (no
  # Apple Developer account needed). Users must right-click → Open on first
  # launch to bypass Gatekeeper.
  build:
    name: Build macOS DMG
    needs: test
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v5

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install workloads
        run: dotnet workload restore MauiMds/MauiMds/MauiMds.csproj

      - name: Set version
        run: echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build Mac Catalyst app
        run: |
          dotnet publish MauiMds/MauiMds/MauiMds.csproj \
            -f net10.0-maccatalyst \
            -c Release \
            /p:ApplicationDisplayVersion=${{ env.VERSION }} \
            /p:ApplicationVersion=${{ github.run_number }} \
            /p:CodesignKey="-" \
            /p:CodesignProvision="" \
            /p:CreatePackage=false

      - name: Locate .app bundle
        run: |
          APP=$(find MauiMds/MauiMds/bin/Release -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app bundle found — searching tree:" && find MauiMds/MauiMds/bin/Release && exit 1
          fi
          echo "APP_PATH=$APP" >> $GITHUB_ENV
          echo "Found: $APP"

      - name: Create DMG
        run: |
          DMG="MauiMds-${{ env.VERSION }}.dmg"

          # Staging folder: app + Applications symlink for drag-install UX
          mkdir dmg_staging
          cp -R "${{ env.APP_PATH }}" dmg_staging/
          ln -s /Applications dmg_staging/Applications

          hdiutil create \
            -volname "MauiMds ${{ env.VERSION }}" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            "$DMG"

          echo "DMG=$DMG" >> $GITHUB_ENV

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          name: MauiMds v${{ env.VERSION }}
          body: |
            ## MauiMds v${{ env.VERSION }}

            **Requires Apple Silicon (M1 / M2 / M3 / M4).** Intel build coming when we set up a Developer ID.

            ### Installation
            1. Download `MauiMds-${{ env.VERSION }}.dmg` below
            2. Open the DMG and drag **MauiMds** into Applications
            3. **First launch only:** right-click the app → **Open**, then click **Open** in the dialog
               — or go to **System Settings → Privacy & Security → Open Anyway**

            > Gatekeeper will warn about an unidentified developer. This is expected for unsigned builds — a Developer ID + notarization is on the roadmap.

            Built from [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          files: ${{ env.DMG }}
          draft: false
          prerelease: false

  # ── Windows Build ─────────────────────────────────────────────────────────
  # Runs after the macOS build so the GitHub Release already exists and we
  # can append the Windows ZIP to it.
  build-windows:
    name: Build Windows EXE
    needs: build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install workloads
        run: dotnet workload restore MauiMds/MauiMds/MauiMds.csproj

      - name: Set version
        run: echo "VERSION=1.0.${{ github.run_number }}" >> $env:GITHUB_ENV

      - name: Build Windows app
        run: |
          dotnet publish MauiMds/MauiMds/MauiMds.csproj `
            -f net10.0-windows10.0.19041.0 `
            -c Release `
            /p:ApplicationDisplayVersion=${{ env.VERSION }} `
            /p:ApplicationVersion=${{ github.run_number }} `
            /p:WindowsPackageType=None `
            /p:SelfContained=true `
            /p:RuntimeIdentifier=win-x64

      - name: Locate publish output
        run: |
          $dir = Get-ChildItem -Recurse -Directory "MauiMds/MauiMds/bin/Release" |
                 Where-Object { $_.Name -eq "publish" } |
                 Select-Object -First 1 -ExpandProperty FullName
          if (-not $dir) {
            Write-Host "ERROR: publish dir not found. Tree:"
            Get-ChildItem -Recurse "MauiMds/MauiMds/bin/Release" | Select-Object FullName
            exit 1
          }
          Write-Host "Found: $dir"
          "PUBLISH_DIR=$dir" >> $env:GITHUB_ENV

      - name: Zip output
        run: Compress-Archive -Path "${{ env.PUBLISH_DIR }}/*" -DestinationPath "MauiMds-${{ env.VERSION }}-windows-x64.zip"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          files: MauiMds-${{ env.VERSION }}-windows-x64.zip
